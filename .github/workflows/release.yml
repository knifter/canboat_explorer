name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name canboat_explorer --collect-all nmea2000 --collect-all PyQt6 --collect-data canboat_explorer canboat_explorer/__main__.py

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/canboat_explorer.exe
