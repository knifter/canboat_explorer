name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip -e .

      - name: Build exe
        run: pyinstaller --onefile --windowed --name canboat_explorer

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/canboat_explorer.exe
